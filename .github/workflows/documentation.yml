name: Create Documentation

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  delete-old-runs:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0

  delete-old-deployments:
    needs: delete-old-runs
    runs-on: ubuntu-latest
    steps:
      - name: Delete old deployments
        uses: strumwolf/delete-deployment-environment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: github-pages
          onlyRemoveDeployments: true

  build:
    needs: delete-old-deployments
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Automate Unity Package Resolution & DLL Extraction
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        run: |
          if [ -z "$UNITY_LICENSE" ]; then
            echo "❌ ERROR: UNITY_LICENSE secret is missing. Unity cannot launch to resolve packages."
            exit 1
          fi

          mkdir -p Documentation/Dependencies
          echo "$UNITY_LICENSE" > UnityLicense.ulf
          
          PROJECT_VER="6000.0.2f1"
          if [ -f "ProjectSettings/ProjectVersion.txt" ]; then
            PROJECT_VER=$(grep "m_EditorVersion:" ProjectSettings/ProjectVersion.txt | awk '{print $2}' | tr -d '\r')
          fi
          
          MAJOR_VER=$(echo $PROJECT_VER | cut -d'.' -f1)
          echo "Project uses Unity $PROJECT_VER (Major: $MAJOR_VER)."
          
          echo "Querying GameCI tags for Unity $MAJOR_VER (Single Request to bypass limits)..."
          TAGS_JSON=$(curl -s "https://hub.docker.com/v2/repositories/unityci/editor/tags?name=ubuntu-${MAJOR_VER}&page_size=100" 2>/dev/null || echo "")
          
          AVAILABLE_TAGS=$(echo "$TAGS_JSON" | jq -r '.results[].name' 2>/dev/null | grep -E "^ubuntu-${MAJOR_VER}\.[0-9]+\.[0-9]+[a-z][0-9]+-base-[0-9.]+$" | sort -V)
          
          FOUND_TAG=""
          if [ -n "$AVAILABLE_TAGS" ]; then
            EXACT_MATCH=$(echo "$AVAILABLE_TAGS" | grep "^ubuntu-${PROJECT_VER}-base" | tail -n 1)
            if [ -n "$EXACT_MATCH" ]; then
              FOUND_TAG=$EXACT_MATCH
              echo "✅ Found exact GameCI image: $FOUND_TAG"
            else
              FOUND_TAG=$(echo "$AVAILABLE_TAGS" | tail -n 1)
              echo "⚠️ Exact version $PROJECT_VER not built by GameCI yet."
              echo "✅ Falling back to highest available Unity $MAJOR_VER image: $FOUND_TAG"
            fi
          else
             echo "⚠️ Rate limit hit or no tags. Using hardcoded safe fallback."
             FOUND_TAG="ubuntu-6000.0.2f1-base-3.1.0"
          fi

          echo "Injecting Optional Packages into manifest.json..."
          python -c '
          import json, os, urllib.request, re, sys
          target_unity = "'"$PROJECT_VER"'"
          packages_to_inject = ["com.unity.behavior", "com.unity.ml-agents"]
          
          def get_latest_compatible(pkg, unity_ver):
              try:
                  url = f"https://packages.unity.com/{pkg}"
                  with urllib.request.urlopen(url) as r:
                      data = json.loads(r.read())
                  versions = data.get("versions", {})
                  target_match = re.match(r"^(\d+)\.(\d+)", unity_ver)
                  if not target_match: return None
                  target_v = [int(target_match.group(1)), int(target_match.group(2))]
                  
                  candidates = []
                  for v_str, v_data in versions.items():
                      req_unity = v_data.get("unity", "0.0")
                      req_match = re.match(r"^(\d+)\.(\d+)", req_unity)
                      if not req_match: continue
                      req_v = [int(req_match.group(1)), int(req_match.group(2))]
                      
                      if req_v <= target_v:
                          candidates.append(v_str)
                  
                  if not candidates: return None
                  return sorted(candidates, key=lambda x: [int(y) for y in re.findall(r"\d+", x)], reverse=True)[0]
              except Exception as e:
                  print(f"Error resolving {pkg}: {e}")
                  return None
                  
          manifest_path = "Packages/manifest.json"
          manifest = {"dependencies": {}}
          if os.path.exists(manifest_path):
              with open(manifest_path, "r") as f:
                  try: manifest = json.load(f)
                  except: pass
          if "dependencies" not in manifest: manifest["dependencies"] = {}
          
          for pkg_name in packages_to_inject:
              latest_ver = get_latest_compatible(pkg_name, target_unity)
              if latest_ver:
                  manifest["dependencies"][pkg_name] = latest_ver
                  print(f"✅ Injected {pkg_name}@{latest_ver} into manifest.json")
              else:
                  print(f"⚠️ Could not resolve compatible version of {pkg_name} for Unity {target_unity}")
                  
          os.makedirs("Packages", exist_ok=True)
          with open(manifest_path, "w") as f:
              json.dump(manifest, f, indent=2)
          '
          
          echo "------ VERIFYING MANIFEST INJECTION ------"
          cat Packages/manifest.json
          echo "------------------------------------------"
          
          echo "Launching Unity to resolve UPM using: unityci/editor:$FOUND_TAG"
          # Included testing flags to force complete resolution and bypass compiler errors
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            unityci/editor:$FOUND_TAG \
            bash -c " \
              echo 'Activating Unity License...' && \
              unity-editor -batchmode -nographics -manualLicenseFile /workspace/UnityLicense.ulf -quit || true && \
              echo 'Opening Unity to compile project...' && \
              unity-editor -batchmode -nographics -projectPath /workspace -silent-crashes -ignoreCompilerErrors -no-browser-auth -no-instance -quit || true && \
              echo 'Copying DLLs...' && \
              cp /opt/unity/Editor/Data/Managed/*.dll /workspace/Documentation/Dependencies/ 2>/dev/null || true && \
              find /workspace/Library -name '*.dll' -exec cp {} /workspace/Documentation/Dependencies/ \; 2>/dev/null || true && \
              chmod -R 777 /workspace/Documentation/Dependencies/ \
            "

      - name: Verify Extracted Dependencies
        run: |
          echo "Listing all extracted DLLs for DocFX:"
          ls -lh Documentation/Dependencies/ || echo "Dependencies directory not found or empty."

      - name: Handle Precompiler Definitions
        run: |
          $trueDefinesFile = "Documentation/TRUE.txt"
          $falseDefinesFile = "Documentation/FALSE.txt"

          $trueDefines = @()
          if (Test-Path $trueDefinesFile) {
              $trueDefines = Get-Content $trueDefinesFile | ForEach-Object { $_.Trim() } | Where-Object { $_ }
              Write-Host "Loaded $($trueDefines.Count) symbols to be replaced with TRUE."
          } else {
              Write-Host "'$trueDefinesFile' not found. No symbols will be replaced with TRUE."
          }

          $falseDefines = @()
          if (Test-Path $falseDefinesFile) {
              $falseDefines = Get-Content $falseDefinesFile | ForEach-Object { $_.Trim() } | Where-Object { $_ }
              Write-Host "Loaded $($falseDefines.Count) symbols to be replaced with FALSE."
          } else {
              Write-Host "'$falseDefinesFile' not found. No symbols will be replaced with FALSE."
          }

          if ($trueDefines.Count -eq 0 -and $falseDefines.Count -eq 0) {
              Write-Host "No define symbol files found or files are empty. Skipping replacement."
              return
          }

          $csFiles = Get-ChildItem -Path . -Filter *.cs -Recurse

          foreach ($file in $csFiles) {
              $originalContent = Get-Content $file.FullName -Raw
              $newContent = $originalContent

              foreach ($define in $trueDefines) {
                  $pattern = "\b$([regex]::Escape($define))\b"
                  $newContent = $newContent -creplace $pattern, 'TRUE'
              }

              foreach ($define in $falseDefines) {
                  $pattern = "\b$([regex]::Escape($define))\b"
                  $newContent = $newContent -creplace $pattern, 'FALSE'
              }

              if ($originalContent -ne $newContent) {
                  Write-Host "Updating definitions in: $($file.FullName)"
                  Set-Content -Path $file.FullName -Value $newContent
              }
          }
        shell: pwsh

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Clean DocFX Intermediate Files
        run: rm -rf Documentation/obj

      - name: Use README.md as index.md
        run: cp README.md Documentation/index.md

      - name: Copy LICENSE.md
        run: |
          mkdir -p Documentation/license
          cp LICENSE.md Documentation/license/index.md

      - name: Generate Metadata
        run: docfx metadata Documentation/docfx.json -l Verbose

      - name: Update API TOC Order and Names
        shell: pwsh
        run: |
          $tocFile = "Documentation/api/toc.yml"
          $namespacesDir = "Documentation/namespaces"
          $orderFile = "Documentation/toc_order.txt"

          if (-not (Test-Path $tocFile -PathType Leaf)) {
              Write-Host "TOC file not found at '$tocFile'. Skipping update."
              exit 0
          }

          $tocContent = Get-Content $tocFile -Raw

          if (Test-Path $orderFile -PathType Leaf) {
              Write-Host "Found TOC order file. Reordering entries..."
              $desiredOrder = Get-Content $orderFile | ForEach-Object { $_.Trim() } | Where-Object { $_ }

              $tocEntries = $tocContent -split '(?m)^(?=- uid:)' | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }

              $sortedEntries = $tocEntries | Sort-Object {
                  if ($_ -match "uid:\s*(\S+)") {
                      $uid = $matches[1]
                      $index = $desiredOrder.IndexOf($uid)
                      if ($index -ne -1) { $index } else { 9999 }
                  } else {
                      9999
                  }
              }

              $tocContent = $sortedEntries -join ""
              Write-Host "TOC reordered."
          } else {
              Write-Host "No '$orderFile' found. Skipping reorder."
          }

          if (Test-Path $namespacesDir -PathType Container) {
              $namespaceFiles = Get-ChildItem -Path $namespacesDir -Filter *.txt
              
              if ($namespaceFiles.Count -gt 0) {
                  $nameMappings = @{}
                  foreach ($file in $namespaceFiles) {
                      $originalName = $file.BaseName
                      $niceName = (Get-Content $file.FullName -Raw).Trim()
                      if (-not [string]::IsNullOrWhiteSpace($niceName)) {
                          $nameMappings[$originalName] = $niceName
                      }
                  }
          
                  foreach ($originalName in $nameMappings.Keys) {
                      $niceName = $nameMappings[$originalName]
                      $pattern = "(name:\s+)$([regex]::Escape($originalName))(?!\S)"
                      if ($tocContent -match $pattern) {
                          Write-Host "Updating name for '$originalName'."
                          $tocContent = $tocContent -creplace $pattern, "name: $niceName"
                      }
                  }
              }
          }
          
          Set-Content -Path $tocFile -Value $tocContent
          Write-Host "Updated '$tocFile' successfully."

      - name: Show API YML Contents
        run: Get-Content Documentation/api/toc.yml
        shell: pwsh
      
      - name: Build Documentation Website
        run: docfx build Documentation/docfx.json -l Verbose

      - name: Copy 404.html
        run: cp Documentation/404.html _site/404.html

      - name: Clean Site HTML
        shell: pwsh
        run: |
          $siteDir = "_site"
          $htmlFiles = Get-ChildItem -Path $siteDir -Filter *.html -Recurse

          foreach ($file in $htmlFiles) {
              $originalContent = Get-Content $file.FullName -Raw

              $newContent = $originalContent -creplace 'https?://agents\.kaijusolutions\.ca', ''
              $newContent = $newContent -creplace '/index\.html#', '#'
              $newContent = $newContent -creplace '/index\.html"', '"'
              $newContent = $newContent -creplace '"index\.html"', '"."'
              $newContent = $newContent -creplace 'name=""', ''
              $newContent = $newContent -creplace '(<a\s+(?!.*\btarget\b=)[^>]*\bhref\s*=\s*["'']https?://[^>]+?)>', '$1 target="_blank">'
              $newContent = $newContent -creplace '<h6><strong>Assembly</strong>: cs.temp.dll.dll</h6>', ''
              $newContent = $newContent -creplace ' </title>', '</title>'
              $newContent = $newContent -creplace '(\r\n|\n|\r)\s+\| ', ' | '
              $newContent = $newContent -creplace '<title>\s*\|\s*', '<title>'

              $genericPipeRegex = '([\w\s.,-]+)\s*\|\s*([\w\s.,-]+)'
              $pipeEvaluator = {
                  param($match)
                  $firstPart = $match.Groups[1].Value.Trim()
                  $secondPart = $match.Groups[2].Value.Trim()

                  if (($firstPart -eq $secondPart) -and (-not [string]::IsNullOrWhiteSpace($firstPart))) {
                      $firstPart
                  } else {
                      $match.Value
                  }
              }
              $newContent = [regex]::Replace($newContent, $genericPipeRegex, $pipeEvaluator)

              if ($originalContent -ne $newContent) {
                  $utf8WithoutBom = New-Object System.Text.UTF8Encoding($false)
                  [System.IO.File]::WriteAllText($file.FullName, $newContent, $utf8WithoutBom)
              }
          }

      - name: Upload Site Artifact
        uses: actions/upload-artifact@v7
        with:
          name: _site
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: https://agents.kaijusolutions.ca
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Download Site Artifact
        uses: actions/download-artifact@v8
        with:
          name: _site
          path: _site

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./_site
          cname: agents.kaijusolutions.ca